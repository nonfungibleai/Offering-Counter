<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#3b2410"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="헌금계수"/>
  <meta name="description" content="교회 헌금 계수 앱 - 항목별 권종 입력 및 합계 계산"/>
  <title>헌금계수</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9972b; --gold-light: #e8c66a; --gold-pale: #fdf6e3;
      --cream: #fefcf7; --brown: #5c3d1e; --brown-dark: #3b2410;
      --surface: #ffffff; --border: #e8d9bc;
      --text: #2d1f0e; --text-dim: #9b7d5a; --shadow: rgba(90,55,15,0.12);
      --radius: 16px; --red: #e74c3c;
    }
    html, body { min-height: 100%; background: var(--cream); font-family: 'Noto Sans KR', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }

    .app-header {
      background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown) 60%, #7a4f28 100%);
      padding: 14px 18px 18px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(59,36,16,0.35);
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .header-title { display: flex; align-items: center; gap: 10px; }
    .cross-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-title h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; }
    .header-title .sub { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 300; letter-spacing: 0.1em; display: block; }
    .header-actions { display: flex; gap: 7px; align-items: center; }
    .hdr-btn {
      height: 32px; padding: 0 11px; border-radius: 20px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85); font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .hdr-btn:active { background: rgba(255,255,255,0.22); }
    .total-summary {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px; padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .total-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.05em; }
    .total-amount { font-size: 26px; font-weight: 700; color: var(--gold-light); letter-spacing: -0.5px; }
    .total-amount span { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.45); margin-left: 3px; }
    .total-count { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    .content { padding: 14px 12px 110px; }

    .offering-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
      box-shadow: 0 2px 10px var(--shadow); transition: box-shadow 0.2s, border-color 0.2s;
    }
    .offering-card.active { box-shadow: 0 4px 20px rgba(201,151,43,0.2); border-color: var(--gold); }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 14px; cursor: pointer; user-select: none;
      background: var(--surface); border-bottom: 1px solid transparent; transition: background 0.15s;
    }
    .offering-card.active .card-header { background: var(--gold-pale); border-bottom-color: var(--border); }
    .card-title { display: flex; align-items: center; gap: 9px; flex: 1; }
    .category-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .card-name { font-size: 15px; font-weight: 700; color: var(--brown-dark); }
    .card-right { display: flex; align-items: center; gap: 6px; }
    .card-total { font-size: 14px; font-weight: 700; color: var(--gold); }
    .card-total.zero { color: var(--text-dim); font-weight: 400; font-size: 13px; }
    .toggle-arrow { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; }
    .offering-card.active .toggle-arrow { transform: rotate(180deg); }
    .edit-cat-btn {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(201,151,43,0.1); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; cursor: pointer; color: var(--gold); transition: all 0.15s; flex-shrink: 0;
    }
    .edit-cat-btn:active { background: rgba(201,151,43,0.25); }

    .bill-grid { padding: 12px 14px 14px; display: none; flex-direction: column; gap: 9px; }
    .offering-card.active .bill-grid { display: flex; }
    .bill-row { display: flex; align-items: center; gap: 8px; }
    .bill-label { display: flex; align-items: center; gap: 7px; min-width: 85px; }
    .bill-icon { width: 36px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .bill-1000  { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .bill-5000  { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
    .bill-10000 { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
    .bill-50000 { background: #f3e5f5; color: #6a1b9a; border: 1px solid #e1bee7; }
    .bill-name { font-size: 12px; font-weight: 500; color: var(--text-dim); }
    .bill-input-wrap { flex: 1; position: relative; }
    .bill-input {
      width: 100%; height: 40px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 28px 0 10px; font-size: 18px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; color: var(--brown-dark);
      text-align: right; background: var(--cream); outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none; appearance: none;
    }
    .bill-input:focus { border-color: var(--gold); background: #fff; }
    .bill-input::placeholder { color: #ccc; font-weight: 300; font-size: 13px; }
    .bill-unit { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-dim); pointer-events: none; }
    .bill-subtotal { min-width: 76px; text-align: right; font-size: 12px; font-weight: 600; color: var(--gold); }
    .bill-subtotal.zero { color: #ccc; font-weight: 400; }
    .card-subtotal-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px 13px; border-top: 1px dashed var(--border); margin-top: 2px;
    }
    .subtotal-label { font-size: 12px; color: var(--text-dim); }
    .subtotal-value { font-size: 17px; font-weight: 700; color: var(--brown); }

    .add-cat-btn {
      width: 100%; height: 50px; border-radius: var(--radius);
      border: 2px dashed var(--border); background: transparent;
      color: var(--text-dim); font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s; margin-bottom: 10px;
    }
    .add-cat-btn:active { background: var(--gold-pale); border-color: var(--gold); color: var(--gold); }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, var(--brown-dark), var(--brown));
      padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 24px rgba(59,36,16,0.3); z-index: 99;
    }
    .bottom-inner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .bottom-total-label { font-size: 12px; color: rgba(255,255,255,0.55); }
    .bottom-total-amount { font-size: 26px; font-weight: 900; color: var(--gold-light); letter-spacing: -1px; }
    .bottom-total-amount small { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.4); margin-left: 2px; }
    .bottom-actions { display: flex; gap: 8px; }
    .btn-reset {
      flex: 1; height: 44px; border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7); font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-reset:active { background: rgba(255,255,255,0.15); }
    .btn-share {
      flex: 1; height: 44px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.12); color: #fff;
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-share:active { background: rgba(255,255,255,0.22); }
    .btn-summary {
      flex: 2; height: 44px; border-radius: 12px; border: none;
      background: var(--gold); color: #fff;
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 14px rgba(201,151,43,0.4);
    }
    .btn-summary:active { transform: scale(0.97); }

    /* MODALS */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(20,10,0,0.65); z-index: 200;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; background: var(--cream); border-radius: 24px 24px 0 0;
      padding: 0 0 calc(24px + env(safe-area-inset-bottom));
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 0; }
    .modal-header {
      padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: var(--cream); z-index: 1;
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--brown-dark); }
    .modal-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%; background: var(--border);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 16px;
    }
    .modal-body { padding: 16px 18px; }

    /* SUMMARY */
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-cat { display: flex; align-items: center; gap: 10px; }
    .summary-cat-name { font-size: 14px; font-weight: 600; color: var(--brown-dark); }
    .summary-cat-detail { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .summary-amount { font-size: 15px; font-weight: 700; color: var(--gold); }
    .summary-amount.zero { color: #ccc; font-weight: 400; }
    .summary-total-row {
      background: var(--gold-pale); border: 1px solid var(--gold);
      border-radius: 12px; padding: 14px 16px; margin-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .summary-total-label { font-size: 14px; font-weight: 700; color: var(--brown); }
    .summary-total-amt { font-size: 22px; font-weight: 900; color: var(--gold); }
    .share-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .share-btn {
      width: 100%; height: 48px; border-radius: 12px; border: none;
      font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .share-btn-primary { background: var(--gold); color: #fff; box-shadow: 0 4px 12px rgba(201,151,43,0.3); }
    .share-btn-secondary { background: var(--surface); border: 1.5px solid var(--border) !important; color: var(--brown); }
    .share-btn:active { transform: scale(0.97); opacity: 0.9; }

    /* CAT MANAGER */
    .cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .cat-edit-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px;
    }
    .cat-color-swatch {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.1); transition: transform 0.15s;
    }
    .cat-color-swatch:active { transform: scale(0.9); }
    .cat-name-input {
      flex: 1; height: 36px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 10px; font-size: 14px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif; color: var(--brown-dark);
      background: var(--cream); outline: none;
    }
    .cat-name-input:focus { border-color: var(--gold); background: #fff; }
    .cat-delete-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: #fdecea; color: var(--red); font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cat-delete-btn:active { background: #f8c8c5; }
    .add-cat-row { display: flex; gap: 8px; }
    .add-cat-input {
      flex: 1; height: 44px; border: 2px dashed var(--border); border-radius: 10px;
      padding: 0 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      color: var(--brown-dark); background: var(--cream); outline: none;
    }
    .add-cat-input:focus { border-color: var(--gold); border-style: solid; background: #fff; }
    .add-cat-confirm {
      height: 44px; padding: 0 16px; border-radius: 10px; border: none;
      background: var(--gold); color: #fff; font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .save-cats-btn {
      width: 100%; height: 48px; border-radius: 12px; border: none;
      background: var(--brown-dark); color: #fff;
      font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 14px;
    }
    .save-cats-btn:active { background: var(--brown); }

    /* COLOR PICKER POPOVER */
    .color-popover {
      position: fixed; background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      z-index: 400; display: none;
    }
    .color-popover.open { display: block; }
    .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .color-opt {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: all 0.15s;
    }
    .color-opt.selected { border-color: var(--brown-dark); transform: scale(1.15); }
    .color-opt:active { transform: scale(0.9); }

    /* CENTER MODAL */
    .center-modal {
      position: fixed; inset: 0; background: rgba(20,10,0,0.65); z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 24px;
    }
    .center-modal.open { opacity: 1; pointer-events: all; }
    .center-box {
      background: var(--cream); border-radius: 20px; padding: 24px; width: 100%; max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); transform: scale(0.9); transition: transform 0.2s;
    }
    .center-modal.open .center-box { transform: scale(1); }
    .center-box h3 { font-size: 16px; font-weight: 700; color: var(--brown-dark); margin-bottom: 16px; }
    .center-input {
      width: 100%; height: 46px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 14px; font-size: 16px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif; color: var(--brown-dark);
      background: #fff; outline: none; margin-bottom: 14px;
    }
    .center-input:focus { border-color: var(--gold); }
    .center-btns { display: flex; gap: 8px; }
    .center-cancel {
      flex: 1; height: 44px; border-radius: 10px; border: 1.5px solid var(--border);
      background: transparent; color: var(--text-dim); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; cursor: pointer;
    }
    .center-ok {
      flex: 2; height: 44px; border-radius: 10px; border: none;
      background: var(--gold); color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
    }

    /* COLOR CLASSES */
    .c0{background:#e74c3c}.c1{background:#e67e22}.c2{background:#f1c40f}
    .c3{background:#27ae60}.c4{background:#2980b9}.c5{background:#8e44ad}
    .c6{background:#16a085}.c7{background:#d35400}.c8{background:#7f8c8d}

    /* INSTALL BANNER */
    .install-banner {
      background: linear-gradient(135deg, #1a3a2a, #2d6a4f);
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .install-banner.hidden { display: none; }
    .install-text { flex: 1; color: #fff; font-size: 12px; line-height: 1.4; }
    .install-text strong { display: block; font-size: 13px; margin-bottom: 1px; }
    .install-btn-small {
      height: 32px; padding: 0 14px; border-radius: 16px; border: none;
      background: #52b788; color: #fff; font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .install-close { width: 24px; height: 24px; background: transparent; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,15,5,0.92); color: #fff; padding: 10px 20px; border-radius: 24px;
      font-size: 13px; font-weight: 500; z-index: 500; opacity: 0;
      transition: all 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* iOS install guide */
    .ios-guide {
      background: var(--gold-pale); border: 1px solid var(--gold);
      border-radius: 12px; padding: 14px; margin: 0 0 12px;
      font-size: 13px; line-height: 1.8; color: var(--brown);
      display: none;
    }
    .ios-guide.show { display: block; }
    .ios-guide strong { color: var(--brown-dark); font-weight: 700; }
  </style>
</head>
<body>

<!-- Install Banner -->
<div class="install-banner hidden" id="installBanner">
  <div class="install-text">
    <strong>📱 홈 화면에 설치하기</strong>
    앱처럼 편리하게 사용할 수 있어요
  </div>
  <button class="install-btn-small" id="installBtn">설치</button>
  <button class="install-close" onclick="dismissInstall()">✕</button>
</div>

<!-- Header -->
<div class="app-header">
  <div class="header-top">
    <div class="header-title">
      <div class="cross-icon">✝</div>
      <div>
        <h1>헌금 계수</h1>
        <span class="sub">OFFERING COUNTER</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="openDateModal()">📅 <span id="dateBadge">날짜</span></button>
      <button class="hdr-btn" onclick="openCatManager()">⚙️ 항목관리</button>
    </div>
  </div>
  <div class="total-summary">
    <div>
      <div class="total-label">전체 합계</div>
      <div class="total-count" id="headerCount">항목을 탭하여 입력하세요</div>
    </div>
    <div class="total-amount" id="headerTotal">0<span>원</span></div>
  </div>
</div>

<!-- Content -->
<div class="content" id="content"></div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="bottom-inner">
    <div class="bottom-total-label">총 헌금액</div>
    <div class="bottom-total-amount" id="bottomTotal">0<small>원</small></div>
  </div>
  <div class="bottom-actions">
    <button class="btn-reset" onclick="confirmReset()">초기화</button>
    <button class="btn-share" onclick="openSummary(true)">📤 공유</button>
    <button class="btn-summary" onclick="openSummary(false)">📋 결과 요약</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="summaryModal" onclick="closeSummaryOnBg(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-title">헌금 계수 결과</div>
        <div class="modal-subtitle" id="summaryDate"></div>
      </div>
      <button class="modal-close" onclick="closeSummary()">✕</button>
    </div>
    <div class="modal-body" id="summaryBody"></div>
  </div>
</div>

<!-- Category Manager Modal -->
<div class="modal-overlay" id="catModal" onclick="closeCatOnBg(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-title">항목 관리</div>
        <div class="modal-subtitle">이름 수정, 색상 변경, 추가·삭제</div>
      </div>
      <button class="modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="cat-list" id="catList"></div>
      <div class="add-cat-row">
        <input class="add-cat-input" id="newCatInput" placeholder="새 항목 이름 입력..." maxlength="12"
          onkeydown="if(event.key==='Enter')addCategory()"/>
        <button class="add-cat-confirm" onclick="addCategory()">+ 추가</button>
      </div>
      <button class="save-cats-btn" onclick="saveCatModal()">✓ 저장하기</button>
    </div>
  </div>
</div>

<!-- Color Popover -->
<div class="color-popover" id="colorPopover">
  <div class="color-grid" id="colorGrid"></div>
</div>

<!-- Inline Edit Modal -->
<div class="center-modal" id="inlineEditModal">
  <div class="center-box">
    <h3 id="inlineEditTitle">항목 이름 변경</h3>
    <input class="center-input" id="inlineEditInput" maxlength="12"
      onkeydown="if(event.key==='Enter')applyInlineEdit()"/>
    <div class="center-btns">
      <button class="center-cancel" onclick="closeInlineEdit()">취소</button>
      <button class="center-ok" onclick="applyInlineEdit()">확인</button>
    </div>
  </div>
</div>

<!-- Date Modal -->
<div class="center-modal" id="dateModal" onclick="closeDateOnBg(event)">
  <div class="center-box">
    <h3>📅 주일 날짜 입력</h3>
    <input class="center-input" type="date" id="dateInput"/>
    <div class="center-btns">
      <button class="center-cancel" onclick="closeDateModal()">취소</button>
      <button class="center-ok" onclick="applyDate()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const DEFAULT_CATS = [
  {id:'thanks', name:'감사 헌금', color:'c0'},
  {id:'build',  name:'건축 헌금', color:'c1'},
  {id:'mission',name:'선교 헌금', color:'c3'},
  {id:'tithe',  name:'십일조',    color:'c4'},
  {id:'branch', name:'지교회',    color:'c5'},
  {id:'other',  name:'기타',      color:'c8'},
];
const BILLS = [
  {val:1000,  label:'1천원', cls:'bill-1000',  tag:'천원'},
  {val:5000,  label:'5천원', cls:'bill-5000',  tag:'오천'},
  {val:10000, label:'1만원', cls:'bill-10000', tag:'만원'},
  {val:50000, label:'5만원', cls:'bill-50000', tag:'오만'},
];
const COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7','c8'];
const COLOR_HEX = {c0:'#e74c3c',c1:'#e67e22',c2:'#f1c40f',c3:'#27ae60',c4:'#2980b9',c5:'#8e44ad',c6:'#16a085',c7:'#d35400',c8:'#7f8c8d'};

let categories = [], billData = {}, openCard = null, currentDate = '', tempCats = [], colorPickIdx = -1, inlineEditId = null;

function lsGet(k, def) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch { return def; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function init() {
  categories = lsGet('offering_cats', JSON.parse(JSON.stringify(DEFAULT_CATS)));
  const saved = lsGet('offering_data', {});
  billData = {};
  categories.forEach(c => {
    billData[c.id] = {};
    BILLS.forEach(b => { billData[c.id][b.val] = saved[c.id]?.(saved[c.id][b.val]||0) ?? (saved[c.id]?saved[c.id][b.val]||0:0); });
  });
  // re-init properly
  categories.forEach(c => {
    if (!billData[c.id]) billData[c.id] = {};
    BILLS.forEach(b => { if (billData[c.id][b.val] === undefined) billData[c.id][b.val] = 0; });
    if (saved[c.id]) BILLS.forEach(b => { billData[c.id][b.val] = parseInt(saved[c.id][b.val])||0; });
  });
  const today = new Date();
  currentDate = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
  document.getElementById('dateBadge').textContent = `${today.getMonth()+1}/${today.getDate()}`;
}

function saveCats() { lsSet('offering_cats', categories); }
function saveData() { lsSet('offering_data', billData); }

function getCatTotal(id) { return BILLS.reduce((s,b)=>s+(billData[id]?.[b.val]||0)*b.val,0); }
function getGrandTotal() { return categories.reduce((s,c)=>s+getCatTotal(c.id),0); }
function fmtWon(n) { return n===0?'0':n.toLocaleString('ko-KR'); }

// ── RENDER ──
function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  categories.forEach(cat => {
    const total = getCatTotal(cat.id);
    const isOpen = openCard === cat.id;
    const card = document.createElement('div');
    card.className = 'offering-card' + (isOpen?' active':'');
    card.id = 'card-' + cat.id;

    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.onclick = e => { if (!e.target.closest('.edit-cat-btn')) toggleCard(cat.id); };
    hdr.innerHTML = `
      <div class="card-title">
        <div class="category-dot ${cat.color}"></div>
        <span class="card-name">${cat.name}</span>
      </div>
      <div class="card-right">
        <button class="edit-cat-btn" onclick="openInlineEdit('${cat.id}')" title="이름 변경">✏️</button>
        <span class="card-total ${total===0?'zero':''}">${total===0?'미입력':fmtWon(total)+'원'}</span>
        <span class="toggle-arrow">▼</span>
      </div>`;
    card.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'bill-grid';
    BILLS.forEach(bill => {
      const cnt = billData[cat.id]?.[bill.val] || 0;
      const sub = cnt * bill.val;
      const row = document.createElement('div');
      row.className = 'bill-row';
      row.innerHTML = `
        <div class="bill-label">
          <div class="bill-icon ${bill.cls}">${bill.tag}</div>
          <span class="bill-name">${bill.label}</span>
        </div>
        <div class="bill-input-wrap">
          <input class="bill-input" type="number" inputmode="numeric" min="0" max="9999"
            placeholder="0" value="${cnt>0?cnt:''}"
            id="inp-${cat.id}-${bill.val}"
            oninput="onInput('${cat.id}',${bill.val},this.value)"/>
          <span class="bill-unit">장</span>
        </div>
        <div class="bill-subtotal ${sub===0?'zero':''}" id="sub-${cat.id}-${bill.val}">${sub===0?'—':fmtWon(sub)}</div>`;
      grid.appendChild(row);
    });
    const sr = document.createElement('div');
    sr.className = 'card-subtotal-row'; sr.id = 'subrow-'+cat.id;
    sr.innerHTML = `<span class="subtotal-label">소계</span><span class="subtotal-value">${fmtWon(total)}원</span>`;
    grid.appendChild(sr);
    card.appendChild(grid);
    content.appendChild(card);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-cat-btn';
  addBtn.innerHTML = '＋ 새 헌금 항목 추가';
  addBtn.onclick = openCatManager;
  content.appendChild(addBtn);
  updateTotals();
}

function toggleCard(id) {
  openCard = openCard===id ? null : id;
  categories.forEach(c => {
    const card = document.getElementById('card-'+c.id);
    if (card) card.classList.toggle('active', c.id===openCard);
  });
  if (openCard) setTimeout(()=>document.getElementById(`inp-${openCard}-1000`)?.focus(), 250);
}

function onInput(catId, billVal, val) {
  if (!billData[catId]) billData[catId] = {};
  const n = Math.max(0, Math.min(9999, parseInt(val)||0));
  billData[catId][billVal] = n;
  saveData();
  const sub = n * billVal;
  const subEl = document.getElementById(`sub-${catId}-${billVal}`);
  if (subEl) { subEl.textContent = sub===0?'—':fmtWon(sub); subEl.className='bill-subtotal'+(sub===0?' zero':''); }
  const catTotal = getCatTotal(catId);
  const card = document.getElementById('card-'+catId);
  if (card) {
    const t = card.querySelector('.card-total');
    if (t) { t.textContent = catTotal===0?'미입력':fmtWon(catTotal)+'원'; t.className='card-total'+(catTotal===0?' zero':''); }
  }
  const sr = document.getElementById('subrow-'+catId);
  if (sr) sr.querySelector('.subtotal-value').textContent = fmtWon(catTotal)+'원';
  updateTotals();
}

function updateTotals() {
  const grand = getGrandTotal();
  const fmt = fmtWon(grand);
  document.getElementById('headerTotal').innerHTML = fmt + '<span>원</span>';
  document.getElementById('bottomTotal').innerHTML = fmt + '<small>원</small>';
  const cnt = categories.filter(c=>getCatTotal(c.id)>0).length;
  document.getElementById('headerCount').textContent = cnt>0 ? `${cnt}개 항목 입력됨` : '항목을 탭하여 입력하세요';
}

// ── INLINE EDIT ──
function openInlineEdit(id) {
  const cat = categories.find(c=>c.id===id); if (!cat) return;
  inlineEditId = id;
  document.getElementById('inlineEditTitle').textContent = `"${cat.name}" 이름 변경`;
  const inp = document.getElementById('inlineEditInput'); inp.value = cat.name;
  document.getElementById('inlineEditModal').classList.add('open');
  setTimeout(()=>inp.focus(), 300);
}
function closeInlineEdit() { document.getElementById('inlineEditModal').classList.remove('open'); inlineEditId=null; }
function applyInlineEdit() {
  const val = document.getElementById('inlineEditInput').value.trim();
  if (!val) return;
  const cat = categories.find(c=>c.id===inlineEditId);
  if (cat) { cat.name=val; saveCats(); renderAll(); showToast('✅ 이름이 변경되었습니다'); }
  closeInlineEdit();
}

// ── CATEGORY MANAGER ──
function openCatManager() {
  tempCats = categories.map(c=>({...c}));
  renderCatList();
  document.getElementById('catModal').classList.add('open');
}
function closeCatModal() { document.getElementById('catModal').classList.remove('open'); closeColorPop(); }
function closeCatOnBg(e) { if (e.target===document.getElementById('catModal')) closeCatModal(); }

function renderCatList() {
  const list = document.getElementById('catList'); list.innerHTML = '';
  tempCats.forEach((cat, idx) => {
    const row = document.createElement('div');
    row.className = 'cat-edit-row';
    row.innerHTML = `
      <div class="cat-color-swatch" style="background:${COLOR_HEX[cat.color]||'#888'}" onclick="openColorPop(${idx}, this)"></div>
      <input class="cat-name-input" value="${cat.name}" maxlength="12"
        oninput="tempCats[${idx}].name=this.value"
        onkeydown="if(event.key==='Enter')this.blur()"/>
      <button class="cat-delete-btn" onclick="deleteTempCat(${idx})" title="삭제">🗑</button>`;
    list.appendChild(row);
  });
}

function deleteTempCat(idx) {
  if (tempCats.length<=1) { showToast('⚠️ 항목은 최소 1개 필요합니다'); return; }
  tempCats.splice(idx, 1); renderCatList();
}

function addCategory() {
  const inp = document.getElementById('newCatInput');
  const name = inp.value.trim();
  if (!name) { showToast('⚠️ 항목 이름을 입력해 주세요'); return; }
  const id = 'cat_' + Date.now();
  const color = COLORS[tempCats.length % COLORS.length];
  tempCats.push({id, name, color}); inp.value='';
  renderCatList(); showToast('✅ 항목이 추가되었습니다');
}

function saveCatModal() {
  categories = tempCats.map(c=>({...c, name:c.name.trim()||'항목'}));
  categories.forEach(c => { if (!billData[c.id]) { billData[c.id]={}; BILLS.forEach(b=>{ billData[c.id][b.val]=0; }); } });
  saveCats(); saveData(); closeCatModal(); renderAll(); showToast('✅ 항목이 저장되었습니다');
}

// ── COLOR POPOVER ──
function openColorPop(idx, swatch) {
  colorPickIdx = idx;
  const pop = document.getElementById('colorPopover');
  const grid = document.getElementById('colorGrid'); grid.innerHTML = '';
  COLORS.forEach(c => {
    const opt = document.createElement('div');
    opt.className = 'color-opt' + (tempCats[idx].color===c?' selected':'');
    opt.style.background = COLOR_HEX[c];
    opt.onclick = e => { e.stopPropagation(); tempCats[colorPickIdx].color=c; closeColorPop(); renderCatList(); };
    grid.appendChild(opt);
  });
  const rect = swatch.getBoundingClientRect();
  pop.style.left = Math.min(rect.left, window.innerWidth-210)+'px';
  pop.style.top = (rect.bottom+8)+'px';
  pop.classList.add('open');
  setTimeout(()=>document.addEventListener('click', closeColorPop, {once:true}), 10);
}
function closeColorPop() { document.getElementById('colorPopover').classList.remove('open'); }

// ── SUMMARY & SHARE ──
function buildText() {
  const grand = getGrandTotal();
  let lines = ['✝ 헌금 계수 결과'];
  if (currentDate) lines.push(currentDate);
  lines.push('─────────────────');
  categories.forEach(cat => {
    const total = getCatTotal(cat.id);
    if (total>0) {
      lines.push(`▪ ${cat.name}: ${fmtWon(total)}원`);
      BILLS.forEach(b => { const cnt=billData[cat.id]?.[b.val]; if(cnt>0) lines.push(`   ${b.label} × ${cnt}장`); });
    }
  });
  lines.push('─────────────────');
  lines.push(`💰 총 합계: ${fmtWon(grand)}원`);
  return lines.join('\n');
}

function openSummary(goShare) {
  const body = document.getElementById('summaryBody');
  const grand = getGrandTotal();
  let rows = '';
  categories.forEach(cat => {
    const total = getCatTotal(cat.id);
    const detail = BILLS.filter(b=>billData[cat.id]?.[b.val]>0).map(b=>`${b.label}×${billData[cat.id][b.val]}장`).join('  ');
    rows += `<div class="summary-row">
      <div class="summary-cat">
        <div class="category-dot ${cat.color}"></div>
        <div><div class="summary-cat-name">${cat.name}</div>${detail?`<div class="summary-cat-detail">${detail}</div>`:''}</div>
      </div>
      <div class="summary-amount ${total===0?'zero':''}">${total===0?'—':fmtWon(total)+'원'}</div>
    </div>`;
  });
  rows += `<div class="summary-total-row">
    <span class="summary-total-label">✝ 총 헌금액</span>
    <span class="summary-total-amt">${fmtWon(grand)}원</span>
  </div>
  <div class="share-actions">
    <button class="share-btn share-btn-primary" onclick="shareText()">📤 공유하기 (카카오톡·문자 등)</button>
    <button class="share-btn share-btn-secondary" onclick="copyText()">📋 텍스트 복사</button>
    <button class="share-btn share-btn-secondary" onclick="sharePrint()">🖨️ 인쇄용 페이지 열기</button>
  </div>`;
  body.innerHTML = rows;
  document.getElementById('summaryDate').textContent = currentDate||'';
  document.getElementById('summaryModal').classList.add('open');
  if (goShare) setTimeout(()=>body.querySelector('.share-btn-primary')?.scrollIntoView({behavior:'smooth',block:'center'}), 400);
}
function closeSummary() { document.getElementById('summaryModal').classList.remove('open'); }
function closeSummaryOnBg(e) { if (e.target===document.getElementById('summaryModal')) closeSummary(); }

async function shareText() {
  const text = buildText();
  if (navigator.share) {
    try { await navigator.share({title:'헌금 계수 결과', text}); showToast('✅ 공유되었습니다'); return; }
    catch(e) { if (e.name==='AbortError') return; }
  }
  await copyText();
}
async function copyText() {
  const text = buildText();
  try { await navigator.clipboard.writeText(text); showToast('📋 클립보드에 복사되었습니다'); }
  catch {
    const ta = document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('📋 복사되었습니다');
  }
}
function sharePrint() {
  const grand = getGrandTotal();
  const trs = categories.map(cat => {
    const total = getCatTotal(cat.id);
    const detail = BILLS.filter(b=>billData[cat.id]?.[b.val]>0).map(b=>`${b.label} × ${billData[cat.id][b.val]}장`).join(', ');
    return `<tr><td>${cat.name}</td><td style="color:#888;font-size:12px">${detail||'—'}</td><td style="font-weight:700;color:#c9972b;text-align:right">${total>0?fmtWon(total)+'원':'—'}</td></tr>`;
  }).join('');
  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>헌금 계수 결과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;padding:32px;max-width:500px;margin:0 auto;color:#2d1f0e}
  h1{font-size:22px;color:#3b2410;margin-bottom:4px}.dt{color:#888;font-size:13px;margin-bottom:28px}
  table{width:100%;border-collapse:collapse;margin-bottom:20px}
  th{text-align:left;padding:10px 14px;background:#fdf6e3;font-size:12px;color:#9b7d5a;border-bottom:2px solid #e8d9bc;font-weight:500}
  th:last-child{text-align:right}td{padding:11px 14px;border-bottom:1px solid #f0e8d0;font-size:14px}
  .tfoot td{background:#fdf6e3;font-weight:900;font-size:16px;color:#c9972b;border-top:2px solid #e8c66a}
  .tfoot td:last-child{text-align:right}
  .print-btn{margin-top:8px;padding:12px 28px;background:#c9972b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
  @media print{.print-btn{display:none}}</style></head>
  <body><h1>✝ 헌금 계수 결과</h1><div class="dt">${currentDate||new Date().toLocaleDateString('ko-KR')}</div>
  <table><thead><tr><th>항목</th><th>권종 내역</th><th>금액</th></tr></thead>
  <tbody>${trs}</tbody>
  <tfoot><tr class="tfoot"><td colspan="2">총 헌금액</td><td>${fmtWon(grand)}원</td></tr></tfoot></table>
  <button class="print-btn" onclick="window.print()">🖨️ 인쇄하기</button></body></html>`);
  win.document.close();
}

// ── DATE ──
function openDateModal() {
  document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
  document.getElementById('dateModal').classList.add('open');
}
function closeDateModal() { document.getElementById('dateModal').classList.remove('open'); }
function closeDateOnBg(e) { if (e.target===document.getElementById('dateModal')) closeDateModal(); }
function applyDate() {
  const val = document.getElementById('dateInput').value;
  if (val) {
    const d = new Date(val);
    const days=['일','월','화','수','목','금','토'];
    currentDate = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    document.getElementById('dateBadge').textContent = `${d.getMonth()+1}/${d.getDate()}`;
  }
  closeDateModal();
}

// ── RESET ──
function confirmReset() {
  if (getGrandTotal()===0) { showToast('⚠️ 입력된 데이터가 없습니다'); return; }
  if (confirm('모든 입력값을 초기화하시겠습니까?')) {
    categories.forEach(c=>{ if(billData[c.id]) BILLS.forEach(b=>{ billData[c.id][b.val]=0; }); });
    saveData(); renderAll(); showToast('🔄 초기화되었습니다');
  }
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── PWA ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!lsGet('install_dismissed', false)) document.getElementById('installBanner').classList.remove('hidden');
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  if (outcome==='accepted') { document.getElementById('installBanner').classList.add('hidden'); showToast('✅ 앱이 설치되었습니다!'); }
  deferredPrompt = null;
};
function dismissInstall() { document.getElementById('installBanner').classList.add('hidden'); lsSet('install_dismissed', true); }

// iOS detection — show manual guide
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
if (isIOS() && !navigator.standalone && !lsGet('install_dismissed', false)) {
  const banner = document.getElementById('installBanner');
  banner.classList.remove('hidden');
  banner.querySelector('.install-text').innerHTML = `<strong>📱 홈 화면에 추가하기 (iPhone)</strong>Safari 하단 공유버튼 → "홈 화면에 추가" 탭`;
  banner.querySelector('#installBtn').style.display = 'none';
}

// ── INIT ──
init();
renderAll();
openCard = categories[0]?.id || null;
if (openCard) document.getElementById('card-'+openCard)?.classList.add('active');
</script>
</body>
</html>
